<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhatLab Studio – Bookingkalender</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:       #111;
  --surface:  #1c1c1c;
  --surf2:    #2a2a2a;
  --border:   #3a3a3a;
  --orange:   #e8682a;
  --orange-d: #c45520;
  --text:     #f0f0f0;
  --muted:    #888;
  --dim:      #555;
  --ra:       #e8682a;
  --ra-bg:    rgba(232,104,42,.18);
  --rb:       #4a9edd;
  --rb-bg:    rgba(74,158,221,.18);
}
body { background:#0a0a0a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
#app { background:var(--bg); color:var(--text); padding:1.25rem; max-width:1100px; margin:0 auto; min-height:100vh; }

/* TOP BAR */
.top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:10px; }
.logo { font-size:18px; font-weight:600; letter-spacing:-.02em; }
.logo .accent { color:var(--orange); }
.logo .sub { color:var(--muted); font-weight:400; font-size:14px; margin-left:4px; }
.nav { display:flex; align-items:center; gap:6px; }
.nav-btn { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:14px; cursor:pointer; color:var(--text); }
.nav-btn:hover { background:var(--surf2); }
.month-label { font-size:15px; font-weight:500; min-width:160px; text-align:center; }
.btn-new { background:var(--orange); color:#fff; border:none; border-radius:8px; padding:7px 16px; font-size:14px; cursor:pointer; font-weight:500; }
.btn-new:hover { background:var(--orange-d); }

/* FILTER BUTTONS */
.room-legend { display:flex; gap:8px; margin-bottom:1.25rem; }
.rfbtn {
  display:flex; align-items:center; gap:6px;
  padding:5px 14px; border-radius:20px; font-size:12px; font-weight:600;
  cursor:pointer; border:2px solid transparent; transition:all .15s;
}
.rfbtn-a-on  { background:var(--ra); border-color:var(--ra); color:#fff; }
.rfbtn-a-off { background:var(--surface); border-color:var(--border); color:var(--dim); }
.rfbtn-b-on  { background:var(--rb); border-color:var(--rb); color:#fff; }
.rfbtn-b-off { background:var(--surface); border-color:var(--border); color:var(--dim); }

/* CALENDAR */
.cal-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.day-hdr { background:var(--surface); padding:8px 4px; text-align:center; font-size:11px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.day-cell { background:var(--surface); min-height:100px; padding:6px; cursor:pointer; transition:background .1s; }
.day-cell:hover { background:var(--surf2); }
.day-cell.other-month .day-num { color:var(--dim); }
.day-cell.today .day-num { background:var(--orange); color:#fff; border-radius:50%; }
.day-num { font-size:12px; font-weight:500; width:22px; height:22px; display:flex; align-items:center; justify-content:center; margin-bottom:4px; }

/* PILLS */
.pill-wrap { position:relative; margin-bottom:2px; }
.pill {
  font-size:10px; border-radius:4px; padding:2px 5px;
  cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:100%; font-weight:500; line-height:1.5; border-left:2px solid transparent;
}
.pill-a { background:var(--ra-bg); color:#f0a070; border-left-color:var(--ra); }
.pill-b { background:var(--rb-bg); color:#7dbfe8; border-left-color:var(--rb); }
.tip {
  display:none; position:absolute; bottom:calc(100% + 6px); left:0; z-index:200;
  background:#222; border:1px solid #444; border-radius:8px;
  padding:8px 10px; min-width:160px; max-width:220px;
  font-size:12px; line-height:1.6; color:#f0f0f0;
  pointer-events:none; white-space:pre-wrap; box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.tip-room { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
.pill-wrap:hover .tip { display:block; }

.more-pill { font-size:10px; color:var(--muted); padding:1px 4px; }
.conflict-banner { font-size:10px; color:#f08080; background:rgba(200,60,60,.18); border-radius:3px; padding:2px 5px; margin-bottom:2px; font-weight:500; }

/* MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:100; padding:1rem; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; width:100%; max-width:440px; }
.modal h3 { font-size:16px; font-weight:600; margin-bottom:1.25rem; color:var(--text); }
.form-row { margin-bottom:1rem; }
.form-row label { display:block; font-size:11px; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em; }
.form-row input, .form-row textarea {
  width:100%; font-size:14px; background:var(--surf2); border:1px solid var(--border);
  border-radius:8px; padding:8px 10px; color:var(--text); outline:none;
  font-family:inherit; color-scheme:dark;
}
.form-row input:focus, .form-row textarea:focus { border-color:var(--orange); }
.form-row textarea { height:64px; resize:vertical; }
.room-picker { display:flex; gap:8px; }
.rpbtn {
  flex:1; padding:8px; border-radius:8px; border:1.5px solid var(--border);
  background:var(--surf2); color:var(--muted); font-size:13px; font-weight:500;
  cursor:pointer; text-align:center; transition:all .15s;
}
.rpbtn-a-sel { border-color:var(--ra); background:var(--ra-bg); color:var(--ra); }
.rpbtn-b-sel { border-color:var(--rb); background:var(--rb-bg); color:var(--rb); }
.conflict-msg { font-size:13px; color:#f08080; background:rgba(200,60,60,.15); border:1px solid rgba(200,60,60,.3); border-radius:8px; padding:8px 12px; margin-bottom:1rem; display:none; }
.confirm-box { background:rgba(200,60,60,.12); border:1px solid rgba(200,60,60,.3); border-radius:8px; padding:12px; margin-bottom:1rem; display:none; }
.confirm-box p { font-size:13px; color:#f08080; margin-bottom:10px; }
.confirm-btns { display:flex; gap:8px; }
.modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:1.25rem; border-top:1px solid var(--border); padding-top:1.25rem; }
.btn { border-radius:8px; padding:8px 18px; font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; }
.btn-ghost { background:var(--surf2); border:1px solid var(--border); color:var(--text); }
.btn-ghost:hover { background:#363636; }
.btn-primary { background:var(--orange); color:#fff; border:none; }
.btn-primary:hover { background:var(--orange-d); }
.btn-danger { background:transparent; border:1px solid rgba(200,60,60,.5); color:#f08080; margin-right:auto; }
.btn-danger:hover { background:rgba(200,60,60,.18); }
.btn-del-ok { background:#a32d2d; color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; font-weight:500; }
.btn-del-ok:hover { background:#882020; }
.btn-del-no { background:var(--surf2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="logo"><span class="accent">Phat</span>Lab<span class="sub">Studio</span></div>
    <div class="nav">
      <button class="nav-btn" id="prev-btn">&#8249;</button>
      <div class="month-label" id="month-label"></div>
      <button class="nav-btn" id="next-btn">&#8250;</button>
    </div>
    <button class="btn-new" id="new-btn">+ Ny booking</button>
  </div>
  <div class="room-legend">
    <button class="rfbtn rfbtn-a-on" id="filter-a">Studio A</button>
    <button class="rfbtn rfbtn-b-on" id="filter-b">Studio B</button>
  </div>
  <div class="cal-grid" id="cal"></div>
</div>

<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title">Ny booking</h3>
    <div class="form-row">
      <label>Rom</label>
      <div class="room-picker">
        <button class="rpbtn" id="rp-a" data-room="a">Studio A</button>
        <button class="rpbtn" id="rp-b" data-room="b">Studio B</button>
      </div>
    </div>
    <div class="form-row"><label>Artist / kunde</label><input type="text" id="f-name" placeholder="Navn" /></div>
    <div class="form-row"><label>Dato</label><input type="date" id="f-date" /></div>
    <div class="form-row" style="display:flex;gap:12px">
      <div style="flex:1"><label>Start</label><input type="time" id="f-start" value="10:00" /></div>
      <div style="flex:1"><label>Slutt</label><input type="time" id="f-end" value="14:00" /></div>
    </div>
    <div class="form-row"><label>Tekniker</label><input type="text" id="f-tech" placeholder="Valgfritt" /></div>
    <div class="form-row"><label>Notat</label><textarea id="f-note" placeholder="Valgfritt..."></textarea></div>
    <div class="conflict-msg" id="conflict-msg">&#9888; Rommet er allerede booket i dette tidsrommet!</div>
    <div class="confirm-box" id="confirm-box">
      <p>Er du sikker på at du vil slette denne bookingen?</p>
      <div class="confirm-btns">
        <button class="btn-del-ok" id="del-ok-btn">Ja, slett</button>
        <button class="btn-del-no" id="del-no-btn">Avbryt</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="del-btn" style="display:none">&#128465; Slett</button>
      <button class="btn btn-ghost" id="cancel-btn">Lukk</button>
      <button class="btn btn-primary" id="save-btn">Lagre</button>
    </div>
  </div>
</div>

<script>
const KEY = 'phatlab_v3';
const DAYS = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const MONTHS = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];

let bookings = [];
let curYear, curMonth;
let editId = null;
let selRoom = 'a';
let showA = true;
let showB = true;

function load() {
  try { const r = localStorage.getItem(KEY); bookings = r ? JSON.parse(r) : []; }
  catch(e) { bookings = []; }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(bookings)); } catch(e) {}
}

function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }

function conflict(date, start, end, room, exId) {
  const s = toMin(start), e = toMin(end);
  return bookings.some(b => {
    if (b.id === exId || b.date !== date || b.room !== room) return false;
    return s < toMin(b.end) && e > toMin(b.start);
  });
}

function roomConflictOnDay(ds, room) {
  const list = bookings.filter(b => b.date === ds && b.room === room)
    .sort((a,b) => a.start.localeCompare(b.start));
  for (let i = 0; i < list.length - 1; i++) {
    if (toMin(list[i].end) > toMin(list[i+1].start)) return true;
  }
  return false;
}

function render() {
  document.getElementById('month-label').textContent = MONTHS[curMonth] + ' ' + curYear;
  const cal = document.getElementById('cal');
  cal.innerHTML = '';
  DAYS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'day-hdr';
    h.textContent = d;
    cal.appendChild(h);
  });

  const first = new Date(curYear, curMonth, 1);
  let dow = first.getDay();
  dow = dow === 0 ? 6 : dow - 1;
  const dim = new Date(curYear, curMonth + 1, 0).getDate();
  const prevDim = new Date(curYear, curMonth, 0).getDate();
  const total = Math.ceil((dow + dim) / 7) * 7;
  const today = new Date();

  for (let i = 0; i < total; i++) {
    let day, mo, yr;
    const cell = document.createElement('div');
    cell.className = 'day-cell';

    if (i < dow) {
      day = prevDim - dow + i + 1; mo = curMonth - 1; yr = curYear;
      if (mo < 0) { mo = 11; yr--; }
      cell.classList.add('other-month');
    } else if (i >= dow + dim) {
      day = i - dow - dim + 1; mo = curMonth + 1; yr = curYear;
      if (mo > 11) { mo = 0; yr++; }
      cell.classList.add('other-month');
    } else {
      day = i - dow + 1; mo = curMonth; yr = curYear;
    }

    if (day === today.getDate() && mo === today.getMonth() && yr === today.getFullYear()) {
      cell.classList.add('today');
    }

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = day;
    cell.appendChild(num);

    const ds = yr + '-' + String(mo+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');

    // Konfliktbanner
    if (showA && roomConflictOnDay(ds, 'a')) {
      const w = document.createElement('div'); w.className = 'conflict-banner';
      w.textContent = '⚠ Konflikt – Studio A'; cell.appendChild(w);
    }
    if (showB && roomConflictOnDay(ds, 'b')) {
      const w = document.createElement('div'); w.className = 'conflict-banner';
      w.textContent = '⚠ Konflikt – Studio B'; cell.appendChild(w);
    }

    // Bookings
    const db = bookings.filter(b => {
      if (b.date !== ds) return false;
      if (b.room === 'a' && !showA) return false;
      if (b.room === 'b' && !showB) return false;
      return true;
    }).sort((a,b) => a.start.localeCompare(b.start));

    db.slice(0,3).forEach(b => {
      const wrap = document.createElement('div');
      wrap.className = 'pill-wrap';

      const p = document.createElement('div');
      p.className = 'pill ' + (b.room === 'a' ? 'pill-a' : 'pill-b');
      p.textContent = b.start + '–' + b.end + ' ' + b.name;
      p.onclick = e => { e.stopPropagation(); openEdit(b); };

      const tip = document.createElement('div');
      tip.className = 'tip';
      const roomLabel = b.room === 'a' ? 'Studio A' : 'Studio B';
      const roomColor = b.room === 'a' ? 'var(--ra)' : 'var(--rb)';
      tip.innerHTML = '<div class="tip-room" style="color:' + roomColor + '">' + roomLabel + '</div>' +
        '<strong>' + b.name + '</strong>\n' +
        b.start + '–' + b.end +
        (b.tech ? '\nTekniker: ' + b.tech : '') +
        (b.note ? '\n' + b.note : '');

      wrap.appendChild(p);
      wrap.appendChild(tip);
      cell.appendChild(wrap);
    });

    if (db.length > 3) {
      const m = document.createElement('div');
      m.className = 'more-pill';
      m.textContent = '+' + (db.length - 3) + ' til';
      cell.appendChild(m);
    }

    cell.onclick = () => openNew(ds);
    cal.appendChild(cell);
  }
}

// Filter-knapper
function updateFilterBtns() {
  document.getElementById('filter-a').className = 'rfbtn ' + (showA ? 'rfbtn-a-on' : 'rfbtn-a-off');
  document.getElementById('filter-b').className = 'rfbtn ' + (showB ? 'rfbtn-b-on' : 'rfbtn-b-off');
}

document.getElementById('filter-a').onclick = function() {
  if (showA && !showB) return; // alltid minst ett synlig
  showA = !showA;
  updateFilterBtns();
  render();
};
document.getElementById('filter-b').onclick = function() {
  if (showB && !showA) return;
  showB = !showB;
  updateFilterBtns();
  render();
};

// Rom-velger i modal
function setRoom(r) {
  selRoom = r;
  document.getElementById('rp-a').className = 'rpbtn' + (r === 'a' ? ' rpbtn-a-sel' : '');
  document.getElementById('rp-b').className = 'rpbtn' + (r === 'b' ? ' rpbtn-b-sel' : '');
}
document.getElementById('rp-a').onclick = function() { setRoom('a'); };
document.getElementById('rp-b').onclick = function() { setRoom('b'); };

function hideConfirm() {
  document.getElementById('confirm-box').style.display = 'none';
  document.getElementById('save-btn').style.display = 'inline-block';
}

function openNew(ds) {
  editId = null;
  document.getElementById('modal-title').textContent = 'Ny booking';
  document.getElementById('f-name').value = '';
  document.getElementById('f-date').value = ds || '';
  document.getElementById('f-start').value = '10:00';
  document.getElementById('f-end').value = '14:00';
  document.getElementById('f-tech').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('del-btn').style.display = 'none';
  document.getElementById('conflict-msg').style.display = 'none';
  setRoom('a');
  hideConfirm();
  document.getElementById('modal').style.display = 'flex';
}

function openEdit(b) {
  editId = b.id;
  document.getElementById('modal-title').textContent = 'Rediger booking';
  document.getElementById('f-name').value = b.name;
  document.getElementById('f-date').value = b.date;
  document.getElementById('f-start').value = b.start;
  document.getElementById('f-end').value = b.end;
  document.getElementById('f-tech').value = b.tech || '';
  document.getElementById('f-note').value = b.note || '';
  document.getElementById('del-btn').style.display = 'inline-flex';
  document.getElementById('conflict-msg').style.display = 'none';
  setRoom(b.room || 'a');
  hideConfirm();
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editId = null;
  hideConfirm();
}

document.getElementById('cancel-btn').onclick = closeModal;

document.getElementById('prev-btn').onclick = function() {
  curMonth--;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  render();
};
document.getElementById('next-btn').onclick = function() {
  curMonth++;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  render();
};
document.getElementById('new-btn').onclick = function() {
  const t = new Date();
  openNew(t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0'));
};

document.getElementById('del-btn').onclick = function() {
  document.getElementById('confirm-box').style.display = 'block';
  document.getElementById('save-btn').style.display = 'none';
};
document.getElementById('del-no-btn').onclick = hideConfirm;
document.getElementById('del-ok-btn').onclick = async function() {
  if (!editId) return;
  bookings = bookings.filter(b => b.id !== editId);
  save(); closeModal(); render();
};

document.getElementById('save-btn').onclick = async function() {
  const name  = document.getElementById('f-name').value.trim();
  const date  = document.getElementById('f-date').value;
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const tech  = document.getElementById('f-tech').value.trim();
  const note  = document.getElementById('f-note').value.trim();
  const room  = selRoom;
  if (!name || !date || !start || !end) { alert('Fyll ut artist, dato og tid.'); return; }
  if (toMin(end) <= toMin(start)) { alert('Slutt må være etter start.'); return; }
  const cm = document.getElementById('conflict-msg');
  if (conflict(date, start, end, room, editId)) { cm.style.display = 'block'; return; }
  cm.style.display = 'none';
  if (editId) {
    const idx = bookings.findIndex(b => b.id === editId);
    if (idx > -1) bookings[idx] = { id:editId, name, date, start, end, tech, note, room };
  } else {
    bookings.push({ id: Date.now().toString(), name, date, start, end, tech, note, room });
  }
  save(); closeModal(); render();
};

(async function() {
  load();
  const n = new Date(); curYear = n.getFullYear(); curMonth = n.getMonth();
  render();
})();
</script>
</body>
</html>
